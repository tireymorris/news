on: push

name: test
jobs:
  install:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: oven-sh/setup-bun@v1

      - run: sudo apt-get update && sudo apt-get install -y lcov
      - run: bun install && bun test --coverage --coverage-reporter lcov && genhtml coverage/lcov.info -o coverage/
